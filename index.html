<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora da Lei de Ohm + Potência</title>
    <style>
        body {
            background-image: url(https://picsum.photos/1920/1080);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Ajustado para não cortar em telas pequenas */
            margin: 0;
            background-color: #a0a0a7;
            padding: 20px;
            /* Respiro lateral no mobile */
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            background-color: rgba(119, 134, 177, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        label {
            display: block;
            margin-top: 10px;
            text-align: left;
            font-weight: bold;
        }

        input[type="number"] {
            padding: 12px;
            margin: 5px 0 15px 0;
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
        }

        button:hover {
            background-color: #06bf10;
        }

        #resultado {
            margin-top: 20px;
            width: 100%;
        }

        .tabela-resultado {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
            background-color: #f4f6ff;
            border-radius: 8px;
            overflow: hidden;
        }

        .tabela-resultado th,
        .tabela-resultado td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .tabela-resultado th {
            background-color: #021972;
            color: white;
        }

        /* Estilo do rodapé do desenvolvedor dentro da tabela */
        .autor-row {
            background-color: #e0e4f5;
            font-size: 12px;
            text-align: center !important;
            color: #210244;
        }

        h2 {
            color: rgb(248, 247, 248);
            font-size: 1.5rem;
            margin-top: 0;
        }

        p {
            color: #0d068a;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .t {
            color: #250249;
        }

        .c {
            color: #3b024e;
        }

        .r {
            color: rgb(37, 2, 69);
        }

        .p {
            color: #290250;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Calculadora da Lei de Ohm</h2>
        <p>Preencha dois valores para calcular.</p>

        <label for="voltagem" class="t">Tensão (V):</label>
        <input type="number" id="voltagem" placeholder="Ex: 220" step="any">

        <label for="corrente" class="c">Corrente (I):</label>
        <input type="number" id="corrente" placeholder="Ex: 10" step="any">

        <label for="resistencia" class="r">Impedância (Z):</label>
        <input type="number" id="resistencia" placeholder="Ex: 22" step="any">

        <label for="potencia" class="p">Potência (W):</label>
        <input type="number" id="potencia" placeholder="Ex: 2200" step="any">

        <button onclick="calcular()">Calcular</button>

        <div id="resultado"></div>
    </div>

    <script>
        function calcular() {
            const V = parseFloat(document.getElementById("voltagem").value);
            const I = parseFloat(document.getElementById("corrente").value);
            const R = parseFloat(document.getElementById("resistencia").value);
            const P = parseFloat(document.getElementById("potencia").value);
            const resultado = document.getElementById("resultado");

            const inputsCount = [!isNaN(V), !isNaN(I), !isNaN(R), !isNaN(P)].filter(Boolean).length;

            if (inputsCount < 2) {
                resultado.innerHTML = "<span style='color:red; font-weight:bold;'>Preencha pelo menos dois valores!</span>";
                return;
            }

            let tensao = V, corrente = I, resistencia = R, potencia = P;

            if (!isNaN(V) && !isNaN(I)) {
                resistencia = V / I; potencia = V * I;
            } else if (!isNaN(V) && !isNaN(R)) {
                corrente = V / R; potencia = (V * V) / R;
            } else if (!isNaN(I) && !isNaN(R)) {
                tensao = I * R; potencia = I * I * R;
            } else if (!isNaN(V) && !isNaN(P)) {
                corrente = P / V; resistencia = V * V / P;
            } else if (!isNaN(I) && !isNaN(P)) {
                tensao = P / I; resistencia = P / (I * I);
            } else if (!isNaN(R) && !isNaN(P)) {
                corrente = Math.sqrt(P / R); tensao = corrente * R;
            }

            // O nome do desenvolvedor agora só aparece aqui, após o cálculo
            resultado.innerHTML = `
                <table class="tabela-resultado">
                  <tr><th>Grandeza</th><th>Valor</th></tr>
                  <tr><td>Tensão</td><td>${formata(tensao)} V</td></tr>
                  <tr><td>Corrente</td><td>${formata(corrente)} A</td></tr>
                  <tr><td>Resistência</td><td>${formata(resistencia)} Ω</td></tr>
                  <tr><td>Potência</td><td>${formata(potencia)} W</td></tr>
                  <tr><td colspan="2" class="autor-row">Desenvolvido por: Ruberlandio Oliveira</td></tr>
                </table>
            `;
        }

        function formata(valor) {
            if (isNaN(valor) || !isFinite(valor)) return "-";
            return valor % 1 === 0 ? valor.toFixed(0) : valor.toFixed(1);
        }
    </script>
</body>

</html>
